<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student ID Card</title>

<style>
body{
    background-color:white;
    font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
}

.card{
    width: 300px;px;
    border:3px solid navy;
    border-radius:15px;
    background-color:lightgrey;
    margin:50px auto;
    text-align:center;
    padding:20px;
}

.card h2{
    color:navy;
    margin:10px 0;
}

.card img{
    width:120px;
    height:120px;
    border-radius:50%;
    border:3px solid green;
}

.info{
    text-align:left;
    margin-top:20px;
    font-size:18px;
}

.info p{
    margin:10px 0;
}

.college{
    background-color:green;
    color:white;
    padding:10px;
    border-radius:10px;
    margin-bottom:15px;
}

.footer{
    margin-top:20px;
    color:red;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="card">

    <div class="college">
        <h2>Gate Educational Institutions</h2>
        <p>Student Identity Card</p>
    </div>

    <img src="https://png.pngtree.com/png-vector/20190710/ourmid/pngtree-user-vector-avatar-png-image_1541962.jpg" alt="Student Photo">

    <div class="info">
        <p><b>Name:</b> Udayani</p>
        <p><b>ID:</b> 23CS101</p>
        <p><b>Course:</b> BCA(AI)</p>
        <p><b>Year:</b> Final Year</p>
        <p><b>Mobile:</b> **********</p>
        <p><b>Blood Group:</b> O+</p>
    </div>

    <div class="footer">
        Valid Till: 2028
    </div>

</div>

</body>
</html>
