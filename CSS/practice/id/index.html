<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }
        .container{
            width:600px;
            margin:200px auto;
            margin-left: 200px; 
            margin-top: 20px;
            /* grid-template-columns:repeat(2, 400px); */

        }
        body{
            font-family: Arial, "Helvetica Neue", Helvetica, sans-serif;
            font-size: large;
            box-sizing:content-box ;
            font-weight:bold;
            color:black;


        }
        
        .logo {
            display:flex;
            align-items:flex-start;
            background-color:aqua;
            text-align: left;
            border-radius: 20px;
            border-style:groove;
            padding:40px;
         }
        .nav{
            background-color:aqua;
            text-align:center;
            border-radius: 10px;
            border-style:groove;
            padding: 40px;
            margin-top: 10px;
        }
        .header{
             background-color:aqua;
            text-align:center;
            border-radius: 10px;
            border-style:groove;
            padding: 40px;
            margin-top: 10px;
        }
        .side{
            background-color:aqua;
            text-align:center;
            border-radius: 10px;
            border-style:groove;
            padding: 15px;
            width:200%;
            min-height: 150px;
            display:flex;
            align-items: center;
            justify-content: center;

        }
        .main{
            display:flex;
            gap:10px;
            margin-top:10px;
            
        }


        #footer{
    
          background-color: aqua;
          text-align: center;
            border-radius: 20px;
            border-style:groove;
            padding: 40px;
            margin-top: 10px;
        }
        .body{
             background-color:aqua;
            text-align:center;
            border-radius: 10px;
            border-style:groove;
            width:400%;
           min-height: 150px;
           padding:15px;
           align-items:center;
           justify-content: center;
           display:flex;

        }
        
        
    </style>
</head>
<body>
    <div class="container">
    <div class="logo">
        LOG0
    </div>
    <div class="nav">
       Navigation
    </div>
    <div class="header">
       Header/Banner
    </div>
    <div class="main">
    <div class="side">
        Side Bar
        
    </div>
    <div class="body">
        Body Area
    </div>
    </div>
    <div id="footer">
        Footer
    </div>
    
    </div>
</body>
</html>
