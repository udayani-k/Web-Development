<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Four Grid Layouts</title>
<link rel="stylesheet" href="index.css">
</head>

<body>
<div id="one">

    <div id="two">
        <div class="layout">
            <div class="box logo">Logo</div>
            <div class="box nav">Navigation</div>
            <div class="box header">Header/Banner</div>
            <div class="box side">Sidebar</div>
            
            <div class="box body">Body Area</div>
            <div class="box footer">Footer</div>
        </div>
    </div>

    <div id="three">
        <div class="layout">
            <div class="box logo">Logo</div>
            <div class="box nav">Navigation</div>
            <div class="box header">Header/Banner</div>
            <div class="box intro">Intro Text Area</div>
            <div class="box b1">Box 1</div>
            <div class="box b2">Box 2</div>
            <div class="box b3">Box 3</div>
            <div class="box footer">Footer</div>
        </div>
    </div>

    <div id="four">
        <div class="layout">
            <div class="box log">Logo</div>
            <div class="box side">Sidebar</div>
            <div class="box header1">Header/Banner</div>
            <div class="box body">Body Area</div>
            <div class="box footer">Footer</div>
        </div>
    </div>

    <div id="five">
        <div class="layout">
            <div class="box logo">logo</div>
            <div class="box nav">Navigation</div>
            <div class="box b1">Box 1</div>
            <div class="box b2">Box 2</div>
            <div class="box b3">Box 3</div>
            <div class="box b4">Box 4</div>
            <div class="box b4">Box 5</div>

            <div class="box footer">Footer</div>
        </div>
    </div>

</div>

</body>
</html>
