<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flex Layout</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

.container{
    display:flex;
    flex-direction:column;
    gap:10px;
    padding:10px;
}

.logo,
.sidebar,
.header,
.body,
.footer{
    background:#5f9ea0;
    color:white;
    text-align:center;
    padding:20px;
    font-size:18px;
}


.sidebar,
.header{
    width:100%;
}

/* Desktop layout */
@media (min-width:768px){

    /* Row for sidebar + header */
    .row{
        display:flex;
        gap:10px;
    }

    .sidebar{
        flex:1;
    }

    .header{
        flex:2;
    }
   
}
@media (min-width:768px){
    .container{
        display:flex;
    }
    .logo,
    .row,
    .body,
    .footer{
        background:;
    }
}


</style>
</head>

<body>

<div class="container">

    <div class="logo">Logo</div>

    <div class="row">
        <div class="sidebar">Sidebar</div>
        <div class="header">Header/Banner</div>
    </div>

    <div class="body">Body Area</div>

    <div class="footer">Footer</div>

</div>

</body>
</html>
