<!DOCTYPE html>
<html>
<head>
    <title>Button Attributes</title>


</head>

<body>

<h2>Button Attributes Example</h2>

<form>

    <!-- Submit Button -->
    <button type="submit">
        Submit
    </button>

    <br><br>

    <!-- Reset Button -->
    <button type="reset">
        Reset
    </button>

    <br><br>

    <!-- Normal Button -->
    <button type="button">
        Normal Button
    </button>

    <br><br>
<!-- login -->
    <button type="login">
        Login
    </button>

    <br><br>

    <!-- Disabled Button -->
    <button disabled>
        Disabled Button
    </button>

    <br><br>

    <!-- Autofocus Button -->
    <button type="Autofocus">
        Autofocus Button
    </button>

    <br><br>
    <button> login</button>


</form>

</body>
</html>
