<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>
    <!-- ordered list -->
     <h3>orderd list</h3>
     <ol type="A">
        <li>python</li>
        <li></li>
        <ul>
            <li>4</li>
            <li>6</li>
        </ul>
        <li>3</li>
 
     </ol>
     <!-- unordered list -->
      <h3>unorderd list</h3>
     <ul type="square">
        <li>2</li>
        <li>3</li>
        <ol>
            <li>3</li>
            <li>4</li>
        </ol>
        <li>5</li>
        <li>8</li>
     </ul>
</body>
</html>
